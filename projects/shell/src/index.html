<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <title>QuizArena</title>
  <base href="/" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

  <!-- ── PWA / Theme ── -->
  <meta name="theme-color" content="#7c3aed" />
  <meta name="description" content="Trivia multijugador en tiempo real" />
  <link rel="manifest" href="manifest.webmanifest" />

  <!-- ── iOS PWA (instalación como app nativa) ── -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="QuizArena" />
  <link rel="apple-touch-icon" href="assets/icons/icon-152x152.png" />
  <link rel="apple-touch-icon" sizes="152x152" href="assets/icons/icon-152x152.png" />
  <link rel="apple-touch-icon" sizes="192x192" href="assets/icons/icon-192x192.png" />

  <!-- ── iOS Splash screens (para pantalla completa) ── -->
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

  <!-- ── Microsoft / Windows ── -->
  <meta name="msapplication-TileColor" content="#7c3aed" />
  <meta name="msapplication-TileImage" content="assets/icons/icon-144x144.png" />
  <meta name="msapplication-config" content="none" />

  <!-- ── Open Graph (compartir en redes) ── -->
  <meta property="og:title" content="QuizArena" />
  <meta property="og:description" content="Trivia multijugador en tiempo real — ¡Desafía a tus amigos!" />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="assets/icons/icon-512x512.png" />

  <!-- ── Favicon SVG ── -->
  <link rel="icon" type="image/svg+xml"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⬡</text></svg>" />
</head>
<body>
  <qa-shell-root></qa-shell-root>
</body>
</html>
