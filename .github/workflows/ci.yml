name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

env:
  NODE_VERSION: "20"

jobs:
  build-check:
    name: Build Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm install

      - name: Build all MFEs
        run: npm run build:all
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Check bundle sizes
        run: |
          echo "── Bundle sizes ──"
          du -sh dist/shell dist/mfe-home dist/mfe-game dist/mfe-leaderboard
